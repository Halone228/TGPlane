version: "3.9"

# Production multi-node deployment.
# Required env vars (set in .env or environment):
#   TELEGRAM_API_ID        — from https://my.telegram.org
#   TELEGRAM_API_HASH      — from https://my.telegram.org
#   TGPLANE_MASTER_KEY     — strong random string (openssl rand -hex 32)
#   POSTGRES_PASSWORD      — postgres password
#   REDIS_PASSWORD         — redis password (can be empty)

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: Dockerfile.worker
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    main:
      condition: service_healthy
  volumes:
    - worker-data:/data/sessions
  environment:
    TDLIB_API_ID: "${TELEGRAM_API_ID}"
    TDLIB_API_HASH: "${TELEGRAM_API_HASH}"
  networks:
    - tgplane

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgplane
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tgplane}"
      POSTGRES_DB: tgplane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgplane"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tgplane

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tgplane

  # ── Main node ───────────────────────────────────────────────────────────────

  main:
    build:
      context: ..
      dockerfile: Dockerfile.main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DATABASE_DSN: "postgres://tgplane:${POSTGRES_PASSWORD:-tgplane}@postgres:5432/tgplane?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      AUTH_MASTER_KEY: "${TGPLANE_MASTER_KEY}"
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "200"
      LOG_JSON: "true"
      LOG_LEVEL: "info"
    volumes:
      - ./config.prod.yaml:/etc/tgplane/config.yaml:ro
      - migrations-vol:/migrations
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tgplane

  # ── Worker nodes ─────────────────────────────────────────────────────────────

  worker-1:
    <<: *worker-base
    volumes:
      - worker1-data:/data/sessions
      - ./config.worker1.yaml:/etc/tgplane/config.worker.yaml:ro
    ports:
      - "8081:8081"

  worker-2:
    <<: *worker-base
    volumes:
      - worker2-data:/data/sessions
      - ./config.worker2.yaml:/etc/tgplane/config.worker.yaml:ro
    ports:
      - "8082:8081"

  # ── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - tgplane

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - tgplane

volumes:
  postgres-data:
  redis-data:
  worker-data:
  worker1-data:
  worker2-data:
  prometheus-data:
  grafana-data:
  migrations-vol:

networks:
  tgplane:
    driver: bridge
